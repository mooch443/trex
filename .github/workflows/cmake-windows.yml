name: CondaBuildWindows

on: [push]

env:
  BUILD_TYPE: Release
  GITHUB_WORKFLOW: CondaBuildWindows

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ["windows-latest"]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
        submodules: recursive

    - name: Cache conda
      uses: actions/cache@v4
      env:
        CACHE_NUMBER: 1
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('.github/environment.yml') }}

    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: base
        channels: conda-forge
        auto-activate: false
        auto-update-conda: true
        use-only-tar-bz2: true
        conda-remove-defaults: true

    - name: Create .condarc file
      shell: bash -el {0}
      run: |
        cat > ~/.condarc <<'EOF'
        channels:
          - conda-forge
        channel_priority: strict
        default_channels: []
        EOF
        cat ~/.condarc
        conda config --show channels
    - name: Verify .condarc content
      run: |
        cat ~/.condarc

    - name: Enable long paths
      shell: pwsh
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        git config --system core.longpaths true

    - name: Prepare short workspace
      shell: pwsh
      run: |
        $shortRoot = "C:\w"
        $shortRepo = "C:\w\t"
        New-Item -ItemType Directory -Force -Path $shortRoot | Out-Null
        if (Test-Path $shortRepo) { Remove-Item -Recurse -Force $shortRepo }
        New-Item -ItemType Directory -Force -Path $shortRepo | Out-Null
        robocopy "${{ github.workspace }}" $shortRepo /MIR /NFL /NDL /NJH /NJS /NC /NS
        if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
        "SHORT_WORKSPACE=$shortRepo" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        Write-Host "SHORT_WORKSPACE=$shortRepo"

    - name: Create tracking env
      shell: bash -el {0}
      working-directory: ${{ env.SHORT_WORKSPACE }}
      run: |
        echo "::group::Create tracking env"
        mamba env create -f .github/environment.yml
        mamba install -y -n tracking python=${{ matrix.python-version }}
        conda activate tracking
        conda info
        conda list
        echo "::endgroup::"

    - name: Build
      shell: bash -el {0}
      working-directory: ${{ env.SHORT_WORKSPACE }}
      run: |
        echo "::group::Info"
        conda activate tracking
        conda info
        conda list
        conda search numpy
        echo "::endgroup::"

        echo "::group::Fix Meta"
        cd "$SHORT_WORKSPACE/conda"
        p=${GITHUB_REF#refs/heads/}
        p_sanitized=${p//\//_}
        p_sanitized=${p_sanitized//-/_}
        
        sed -i -e '/^{% set git_tag =/ s+main+'$p'+g' meta.yaml
        sed -i -e '/^{% set git_tag_sanitized =/ s+main+'$p_sanitized'+g' meta.yaml
        cat meta.yaml
        sed -i.bak 's|--index-url https://download.pytorch.org/whl/cu118||g' post-link.bat
        cat post-link.sh
        echo "::endgroup::"

        echo "::group::Build"

        # Keep PATH short before conda-build expands it again inside cmd.exe
        export PATH="/c/Windows/system32:/c/Windows:/c/Program Files/Git/cmd:/c/Program Files/CMake/bin:$CONDA_PREFIX/Scripts:$CONDA_PREFIX/Library/bin:$CONDA_PREFIX/bin"

        conda update --all --override-channels -c conda-forge -y
        conda build . --override-channels -c conda-forge

        echo "::endgroup::"
        echo "$CONDA_PREFIX"

    - name: Test
      shell: bash -el {0}
      working-directory: ${{ env.SHORT_WORKSPACE }}
      run: |
        echo "::group::Test"
        conda activate tracking
        echo "$CONDA_PREFIX"
        conda search numpy
        conda create -y -n test --override-channels -c "$CONDA_PREFIX/conda-bld/" -c conda-forge trex
        conda activate test
        pvinfo -opencv_ffmpeg_support
        pvinfo -opencv_opencl_support
        echo "::endgroup::"

    - name: TestFunctions
      continue-on-error: true
      shell: bash -el {0}
      working-directory: ${{ env.SHORT_WORKSPACE }}
      run: |
        echo "::group::TestFunctions"
        cd "$SHORT_WORKSPACE/Application/Tests"
        conda activate test
        ./run_unix.bash
        TEST_EC=$?
        echo "TEST_EXIT_CODE=$TEST_EC" >> "$GITHUB_ENV"
        echo "::endgroup::"
        exit 0

    - name: DLL dependency diagnostics (Dependencies.exe)
      if: env.TEST_EXIT_CODE != '0'
      shell: bash -el {0}
      working-directory: ${{ env.SHORT_WORKSPACE }}
      run: |
        echo "::group::DLL diagnostics"
        conda activate test

        curl -L -o deps.zip \
          https://github.com/lucasg/Dependencies/releases/download/v1.11.1/Dependencies_x64_Release.zip
        unzip -q deps.zip -d deps
        DEPS="$PWD/deps/Dependencies.exe"

        echo "CONDA_PREFIX=$CONDA_PREFIX"

        # find likely binaries from the test env
        EXES=()
        if command -v pvinfo >/dev/null 2>&1; then EXES+=("$(which pvinfo)"); fi
        if command -v trex >/dev/null 2>&1; then EXES+=("$(which trex)"); fi

        # scan each exe
        for exe in "${EXES[@]}"; do
          echo "=== Dependencies scan for: $exe ==="
          "$DEPS" -modules "$exe" || true
          echo ""
        done

        # also scan any .pyd in site-packages (DLL-load failures on import)
        PYD_DIR="$CONDA_PREFIX/Lib/site-packages"
        if [ -d "$PYD_DIR" ]; then
          echo "=== Scanning .pyd files under $PYD_DIR ==="
          find "$PYD_DIR" -maxdepth 3 -name "*.pyd" 2>/dev/null | head -n 20 | while read -r pyd; do
            echo "--- $pyd ---"
            "$DEPS" -modules "$pyd" || true
          done
        fi

        echo "::endgroup::"

    - name: Fail if tests failed
      if: env.TEST_EXIT_CODE != '0'
      shell: bash -el {0}
      run: |
        echo "Tests failed with exit code $TEST_EXIT_CODE"
        exit "$TEST_EXIT_CODE"

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-failure-artifacts
        path: |
          ${{ env.SHORT_WORKSPACE }}/videos/corrected/data/*.csv
          ${{ env.SHORT_WORKSPACE }}/videos/**/*.html
          ${{ env.SHORT_WORKSPACE }}/videos/**/*.log
          ${{ env.SHORT_WORKSPACE }}/videos/**/*.npz
          ${{ env.SHORT_WORKSPACE }}/videos/**/*.results
          ${{ env.SHORT_WORKSPACE }}/videos/**/*.pv
          ${{ env.SHORT_WORKSPACE }}/**/.messages.txt
          ${{ env.SHORT_WORKSPACE }}/**/deps-scan.txt
        if-no-files-found: ignore
        retention-days: 7
        compression-level: 9