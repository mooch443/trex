name: CondaBuildWindows

on: [push]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  GITHUB_WORKFLOW: CondaBuildWindows

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/actions/configuring-and-managing-workflows/configuring-a-workflow#configuring-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-latest"]
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
        submodules: 'recursive'
    - name: Cache conda
      uses: actions/cache@v4
      env:
        # Increase this value to reset cache if .github/environment.yml has not changed
        CACHE_NUMBER: 1
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('.github/environment.yml') }}
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: base
        channels: conda-forge
        auto-activate: false
        auto-update-conda: true
        use-only-tar-bz2: true
        conda-remove-defaults: true
    - name: Create .condarc file
      run: |
        conda config --show channels
        echo "channels:" > ~/.condarc
        echo "  - conda-forge" >> ~/.condarc
        echo "channel_priority: strict" >> ~/.condarc
        echo "default_channels: []" >> ~/.condarc
    - name: Verify .condarc content
      run: |
        cat ~/.condarc
    - name: Show current conda channels
      run: conda config --show channels
    - name: Enable long paths
      run: |
        echo "::group::Enable long paths"
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        git config --system core.longpaths true
        echo "::endgroup::"
    - name: Create tracking env
      shell: bash -el {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Create tracking env"
        mamba env create -f .github/environment.yml
        mamba install -y -n tracking python=${{ matrix.python-version }}
        conda activate tracking
        conda info
        conda list
        echo "::endgroup::"
    - name: Build
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Info"
        conda activate tracking
        conda info
        conda list
        conda search numpy
        echo "::endgroup::"
        echo "::group::Fix Meta"
        cd $GITHUB_WORKSPACE/conda
        p=${GITHUB_REF##*/}
        sed -i -e '/^{% set git_tag =/ s+main+'$p'+g' meta.yaml
        cat meta.yaml
        sed -i.bak 's|--index-url https://download.pytorch.org/whl/cu118||g' post-link.bat
        cat post-link.sh
        echo "::endgroup::"
        echo "::group::Build"
        conda update --all --override-channels -c conda-forge -y
        conda build . --override-channels -c conda-forge
        echo "::endgroup::"
        echo $CONDA_PREFIX
    - name: Test
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Test"
        conda activate tracking
        echo $CONDA_PREFIX
        conda search numpy
        conda create -y -n test --override-channels -c $CONDA_PREFIX/conda-bld/ -c conda-forge trex
        conda activate test
        pvinfo -opencv_ffmpeg_support
        pvinfo -opencv_opencl_support
        echo "::endgroup::"
    - name: TestFunctions
      continue-on-error: true
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::TestFunctions"
        cd $GITHUB_WORKSPACE/Application/Tests
        conda activate test
        ./run_unix.bash
        TEST_EC=$?
        echo "TEST_EXIT_CODE=$TEST_EC" >> $GITHUB_ENV
        echo "::endgroup::"
        exit 0
    - name: DLL dependency diagnostics (Dependencies.exe)
      if: env.TEST_EXIT_CODE != '0'
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::DLL diagnostics"
        conda activate test
        
        # grab portable Dependencies tool
        curl -L -o deps.zip \
          https://github.com/lucasg/Dependencies/releases/download/v1.11.1/Dependencies_x64_Release.zip
        unzip -q deps.zip -d deps
        DEPS="$PWD/deps/Dependencies.exe"

        echo "CONDA_PREFIX=$CONDA_PREFIX"

        # find likely binaries from the test env
        EXES=()
        if command -v pvinfo >/dev/null 2>&1; then EXES+=("$(which pvinfo)"); fi
        if command -v trex   >/dev/null 2>&1; then EXES+=("$(which trex)"); fi

        # scan each exe
        for exe in "${EXES[@]}"; do
          echo "=== Dependencies scan for: $exe ==="
          "$DEPS" -modules "$exe" || true
          echo ""
        done

        # also scan any .pyd in site-packages (DLL-load failures on import)
        PYD_DIR="$CONDA_PREFIX/Lib/site-packages"
        if [ -d "$PYD_DIR" ]; then
          echo "=== Scanning .pyd files under $PYD_DIR ==="
          find "$PYD_DIR" -name "*.pyd" -maxdepth 3 2>/dev/null | head -n 20 | while read -r pyd; do
            echo "--- $pyd ---"
            "$DEPS" -modules "$pyd" || true
          done
        fi

        echo "::endgroup::"
    - name: Fail if tests failed
      if: env.TEST_EXIT_CODE != '0'
      shell: bash -l {0}
      run: |
        echo "Tests failed with exit code $TEST_EXIT_CODE"
        exit $TEST_EXIT_CODE
    - name: Upload failure artifacts (.csv, .npz, .results, .pv, logs, html, post-link logs)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-failure-artifacts
        path: |
          ${{ github.workspace }}/videos/corrected/data/*.csv
          ${{ github.workspace }}/videos/**/*.html
          ${{ github.workspace }}/videos/**/*.log
          ${{ github.workspace }}/videos/**/*.npz
          ${{ github.workspace }}/videos/**/*.results
          ${{ github.workspace }}/videos/**/*.pv
          ${{ github.workspace }}/**/.messages.txt
          ${{ github.workspace }}/**/deps-scan.txt
        if-no-files-found: ignore
        retention-days: 7
        compression-level: 9
