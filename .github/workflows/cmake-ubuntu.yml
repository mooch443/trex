name: CondaBuildLinux

on: [push]

permissions:
  contents: write

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  GITHUB_WORKFLOW: CondaBuildUbuntu

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/actions/configuring-and-managing-workflows/configuring-a-workflow#configuring-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04"]
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}
        submodules: 'recursive'
    - name: Cache conda
      uses: actions/cache@v4
      env:
        # Increase this value to reset cache if etc/example-environment.yml has not changed
        CACHE_NUMBER: 1
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('.github/environment.yml') }}
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        conda-remove-defaults: true
        auto-activate: true
        auto-update-conda: false
        activate-environment: base
        pkgs-dirs: ~/conda_pkgs_dir
    - name: Get conda prefix and cache date
      id: conda-prefix
      shell: bash
      run: |
        echo "path=$CONDA" >> $GITHUB_OUTPUT
        echo "month=$(date +%Y-%m)" >> $GITHUB_OUTPUT
    - name: Cache conda base environment
      id: conda-env-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.conda-prefix.outputs.path }}
        key: ${{ runner.os }}-conda-env-${{ steps.conda-prefix.outputs.month }}-${{ hashFiles('.github/environment.yml') }}
    - name: Install environment into base
      if: steps.conda-env-cache.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Install environment into base"
        conda env update --name base -f .github/environment.yml
        conda info
        conda list
        echo "::endgroup::"
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        sudo apt-get clean
    - name: Build
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Info"
        conda info
        echo $CONDA_DEFAULT_ENV
        conda list
        echo "::endgroup::"
        echo "::group::Fix Meta"
        cd $GITHUB_WORKSPACE/conda
        p=${GITHUB_REF_NAME}
        p_sanitized=${p//\//_}
        p_sanitized=${p_sanitized//-/_}
        sed -i -e '/^{% set git_tag =/ s+{% set git_tag = "[^"]*" %}+{% set git_tag = "'"$p"'" %}+g' meta.yaml
        sed -i -e '/^{% set git_tag_sanitized =/ s+{% set git_tag_sanitized = "[^"]*" %}+{% set git_tag_sanitized = "'"$p_sanitized"'" %}+g' meta.yaml
        sed -i -e 's/_cuda[0-9.]*/\*/g' -e 's/_cudnn/\*/g' -e 's/_cu[0-9.]*/\*/g' meta.yaml
        sed -i.bak 's|--index-url https://download.pytorch.org/whl/cu118||g' post-link.sh
        cat meta.yaml
        echo "::endgroup::"
        echo "::group::Build"
        conda build . --override-channels -c conda-forge
        echo "::endgroup::"
        echo $CONDA_PREFIX
    - name: Test
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Test"
        echo $CONDA_PREFIX
        conda index $CONDA_PREFIX/conda-bld/
        conda create -y -n test --override-channels -c $CONDA_PREFIX/conda-bld/ -c conda-forge trex
        conda activate test
        pvinfo -opencv_ffmpeg_support
        pvinfo -opencv_opencl_support
        echo "::endgroup::"
        echo "::group::TestFunctions"
        conda install -y -n test unzip
        cd $GITHUB_WORKSPACE/Application/Tests
        ./run_unix.bash
        echo "::endgroup::"
    - name: Collect conda package artifacts
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        out="$GITHUB_WORKSPACE/conda-artifacts"
        mkdir -p "$out"
        packages=()
        while IFS= read -r -d '' pkg; do
          packages+=("$pkg")
        done < <(find "$CONDA_PREFIX/conda-bld" -type f -name 'trex-*.conda' -print0)
        if [ "${#packages[@]}" -eq 0 ]; then
          echo "No trex .conda packages found under $CONDA_PREFIX/conda-bld" >&2
          exit 1
        fi
        latest=$(ls -t "${packages[@]}" | head -n 1)
        cp "$latest" "$out/$(basename "$latest")"
        ls -lh "$out"
    - name: Upload conda packages
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: trex-conda-linux-64
        path: ${{ github.workspace }}/conda-artifacts/*.conda
        if-no-files-found: error
        retention-days: 14
        compression-level: 0
    - name: Attach conda packages to GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        tag="$GITHUB_REF_NAME"
        if ! gh release view "$tag" >/dev/null 2>&1; then
          gh release create "$tag" --verify-tag --title "$tag" --notes "Conda package builds for $tag." || gh release view "$tag" >/dev/null
        fi
        mkdir -p "$GITHUB_WORKSPACE/release-assets"
        zip -j "$GITHUB_WORKSPACE/release-assets/trex-conda-linux-64.zip" "$GITHUB_WORKSPACE"/conda-artifacts/*.conda
        gh release upload "$tag" "$GITHUB_WORKSPACE"/release-assets/*.zip --clobber
    - name: Upload failure artifacts (.csv, .npz, .results, .pv, logs, html, post-link logs)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: linux-failure-artifacts
        path: |
          ${{ github.workspace }}/videos/corrected/data/*.csv
          ${{ github.workspace }}/videos/**/*.html
          ${{ github.workspace }}/videos/**/*.log
          ${{ github.workspace }}/videos/**/*.npz
          ${{ github.workspace }}/videos/**/*.results
          ${{ github.workspace }}/videos/**/*.pv
          ${{ github.workspace }}/**/.messages.txt
        if-no-files-found: ignore
        retention-days: 7
        compression-level: 9
