name: CondaBuildMacOSARM64

on: [push]

permissions:
  contents: write

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  MACOSX_DEPLOYMENT_TARGET: 11.0
  CONDA_BUILD_SYSROOT: /Applications/Xcode_26.3.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
  SDKROOT: /Applications/Xcode_26.3.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
  GITHUB_WORKFLOW: CondaBuildMacOS

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/actions/configuring-and-managing-workflows/configuring-a-workflow#configuring-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["macos-26"]
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}
        submodules: 'recursive'
    - name: Select current SDK
      run: |
        sudo xcode-select -s $(dirname $(dirname $(dirname $(dirname $(dirname $SDKROOT)))))
        echo "Xcode version selected:"
        xcodebuild -version
    - name: Compute env file hash (workaround for macos hashFiles bug)
      id: envhash
      shell: bash
      run: |
        h=$(shasum -a 256 .github/macos-environment-arm64.yml | awk '{print $1}')
        echo "hash=$h" >> "$GITHUB_OUTPUT"
    - name: Cache conda
      uses: actions/cache@v4
      env:
        # Increase this value to reset cache if etc/example-environment.yml has not changed
        CACHE_NUMBER: 1
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ steps.envhash.outputs.hash }}
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: base
        channels: conda-forge
        auto-update-conda: false
    - name: Get conda prefix
      id: conda-prefix
      shell: bash
      run: echo "path=$CONDA" >> $GITHUB_OUTPUT
    - name: Cache conda base environment
      id: conda-env-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.conda-prefix.outputs.path }}
        key: ${{ runner.os }}-conda-env-1-${{ steps.envhash.outputs.hash }}
    - name: Install environment into base
      if: steps.conda-env-cache.outputs.cache-hit != 'true'
      shell: bash -el {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Install environment into base"
        conda env update --name base -f .github/macos-environment-arm64.yml
        conda info
        conda list
        echo "::endgroup::"
    - name: Create .condarc file
      run: |
        conda config --show channels
        echo "channels:" > ~/.condarc
        echo "  - conda-forge" >> ~/.condarc
        echo "channel_priority: strict" >> ~/.condarc
        echo "default_channels: []" >> ~/.condarc
    - name: Verify .condarc content
      run: |
        cat ~/.condarc
    - name: Show Xcode SDK locations
      run: |
        echo "SDKROOT: $SDKROOT"
        ls -l /Applications/Xcode*.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/
        ls -l $SDKROOT
    - name: Show current conda channels
      run: conda config --show channels
    - name: Build
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Info"
        conda info
        conda search --override-channels -c conda-forge numpy
        conda list
        echo "::endgroup::"
        echo "::group::Fix Meta"
        cd $GITHUB_WORKSPACE/conda
        p=${GITHUB_REF_NAME}
        p_sanitized=${p//\//_}
        p_sanitized=${p_sanitized//-/_}
        sed -i -e '/^{% set git_tag =/ s+{% set git_tag = "[^"]*" %}+{% set git_tag = "'"$p"'" %}+g' meta.yaml
        sed -i -e '/^{% set git_tag_sanitized =/ s+{% set git_tag_sanitized = "[^"]*" %}+{% set git_tag_sanitized = "'"$p_sanitized"'" %}+g' meta.yaml
        cat meta.yaml
        echo "::endgroup::"
        echo "::group::Fix PostLink"
        sed -i.bak '/from ultralytics import YOLO/d' post-link.sh
        cat post-link.sh
        echo "::endgroup::"
        echo "::group::Build"
        conda update --all --override-channels -c conda-forge -y
        conda build . --override-channels -c conda-forge
        echo "::endgroup::"
        echo $CONDA_PREFIX
    - name: Test
      shell: bash -l {0}
      working-directory: ${{github.workspace}}
      run: |
        echo "::group::Test"
        echo $CONDA_PREFIX
        conda search --override-channels -c conda-forge numpy
        conda create -y -n test --override-channels -c $CONDA_PREFIX/conda-bld/ -c conda-forge trex
        conda activate test
        conda install -y git
        pvinfo -opencv_ffmpeg_support
        pvinfo -opencv_opencl_support
        echo "::endgroup::"
        echo "::group::TestFunctions"
        conda install -y unzip
        cd $GITHUB_WORKSPACE/Application/Tests
        ./run_unix.bash
        echo "::endgroup::"
    - name: Collect conda package artifacts
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      shell: bash -l {0}
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        out="$GITHUB_WORKSPACE/conda-artifacts"
        mkdir -p "$out"
        packages=()
        while IFS= read -r -d '' pkg; do
          packages+=("$pkg")
        done < <(find "$CONDA_PREFIX/conda-bld" -type f -name 'trex-*.conda' -print0)
        if [ "${#packages[@]}" -eq 0 ]; then
          echo "No trex .conda packages found under $CONDA_PREFIX/conda-bld" >&2
          exit 1
        fi
        latest=$(ls -t "${packages[@]}" | head -n 1)
        cp "$latest" "$out/$(basename "$latest")"
        ls -lh "$out"
    - name: Upload conda packages
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: trex-conda-osx-arm64
        path: ${{ github.workspace }}/conda-artifacts/*.conda
        if-no-files-found: error
        retention-days: 14
        compression-level: 0
    - name: Attach conda packages to GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash -l {0}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        tag="$GITHUB_REF_NAME"
        if ! gh release view "$tag" >/dev/null 2>&1; then
          gh release create "$tag" --verify-tag --title "$tag" --notes "Conda package builds for $tag." || gh release view "$tag" >/dev/null
        fi
        mkdir -p "$GITHUB_WORKSPACE/release-assets"
        zip -j "$GITHUB_WORKSPACE/release-assets/trex-conda-osx-arm64.zip" "$GITHUB_WORKSPACE"/conda-artifacts/*.conda
        gh release upload "$tag" "$GITHUB_WORKSPACE"/release-assets/*.zip --clobber
    - name: Upload failure artifacts (.csv, .npz, .results, .pv, logs, html, post-link logs)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64-failure-artifacts
        path: |
          ${{ github.workspace }}/videos/corrected/data/*.csv
          ${{ github.workspace }}/videos/**/*.html
          ${{ github.workspace }}/videos/**/*.log
          ${{ github.workspace }}/videos/**/*.npz
          ${{ github.workspace }}/videos/**/*.results
          ${{ github.workspace }}/videos/**/*.pv
          ${{ github.workspace }}/**/.messages.txt
        if-no-files-found: ignore
        retention-days: 7
        compression-level: 9
